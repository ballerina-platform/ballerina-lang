//apply from: "$rootDir/gradle/javaProject.gradle"
apply plugin: 'java'
apply plugin: 'checkstyle'
apply plugin: "com.github.spotbugs"

apply from: "$rootDir/gradle/repositories.gradle"

configurations {
    dist {
        transitive false
    }
}

dependencies {

    // Lang lib Bir
    dist project(path: ':ballerina-lang:internal', configuration: 'birJar')
    dist project(path: ':ballerina-lang:annotations', configuration: 'birJar')
    dist project(path: ':ballerina-lang:array', configuration: 'birJar')
    dist project(path: ':ballerina-lang:decimal', configuration: 'birJar')
    dist project(path: ':ballerina-lang:error', configuration: 'birJar')
    dist project(path: ':ballerina-lang:floatingpoint', configuration: 'birJar')
    dist project(path: ':ballerina-lang:future', configuration: 'birJar')
    dist project(path: ':ballerina-lang:integer', configuration: 'birJar')
    dist project(path: ':ballerina-lang:map', configuration: 'birJar')
    dist project(path: ':ballerina-lang:object', configuration: 'birJar')
    dist project(path: ':ballerina-lang:stream', configuration: 'birJar')
    dist project(path: ':ballerina-lang:string', configuration: 'birJar')
    dist project(path: ':ballerina-lang:table', configuration: 'birJar')
    dist project(path: ':ballerina-lang:typedesc', configuration: 'birJar')
    dist project(path: ':ballerina-lang:value', configuration: 'birJar')
    dist project(path: ':ballerina-lang:xml', configuration: 'birJar')
    dist project(path: ':ballerina-lang:bool', configuration: 'birJar')
    dist project(path: ':ballerina-observability', configuration: 'birJar')
    dist project(path: ':metrics-extensions:ballerina-prometheus-extension', configuration: 'birJar')

    // Lang libs
    dist project(':ballerina-lang:internal')
    dist project(':ballerina-lang:annotations')
    dist project(':ballerina-lang:array')
    dist project(':ballerina-lang:decimal')
    dist project(':ballerina-lang:error')
    dist project(':ballerina-lang:floatingpoint')
    dist project(':ballerina-lang:future')
    dist project(':ballerina-lang:integer')
    dist project(':ballerina-lang:map')
    dist project(':ballerina-lang:object')
    dist project(':ballerina-lang:stream')
    dist project(':ballerina-lang:string')
    dist project(':ballerina-lang:table')
    dist project(':ballerina-lang:typedesc')
    dist project(':ballerina-lang:value')
    dist project(':ballerina-lang:xml')
    dist project(':ballerina-lang:bool')
    dist project(':ballerina-observability')

    // Third party jars
    // config
    dist "org.slf4j:slf4j-jdk14:${slf4jVersion}"
    dist "org.slf4j:slf4j-api:${slf4jVersion}"
    dist "com.moandjiezana.toml:toml4j:${toml4jVersion}"
    dist "org.wso2.orbit.org.antlr:antlr4-runtime:${antlr4RuntimeVersion}"
    dist "org.apache.commons:commons-lang3:${commonsLang3Version}"
    dist "com.fasterxml.woodstox:woodstox-core:${woodstoxVersion}"
    dist "org.codehaus.woodstox:stax2-api:${stax2ApiVersion}"

    // runtime
    dist "org.apache.ws.commons.axiom:axiom-c14n:${apacheAxiomVersion}"
    dist "org.apache.ws.commons.axiom:axiom-impl:${apacheAxiomVersion}"
    dist "org.apache.ws.commons.axiom:axiom-api:${apacheAxiomVersion}"
    dist "org.apache.ws.commons.axiom:axiom-dom:${apacheAxiomVersion}"
    dist "commons-logging:commons-logging:${commonsLoggingVersion}"
    dist "io.opentracing:opentracing-api:${openTracingVersion}"
    dist "io.opentracing:opentracing-util:${openTracingVersion}"
    dist "org.awaitility:awaitility:${awaitilityVersion}"
    dist "org.hdrhistogram:HdrHistogram:${hdrHistogramVersion}"
    dist "com.h2database:h2:${h2Version}"

    // observability extensions
    //// metrics
    dist project(':metrics-extensions:ballerina-metrics-extension')
    dist project(':metrics-extensions:ballerina-prometheus-extension')
    //// tracing
    dist project(':tracing-extensions:ballerina-jaeger-extension')
    dist project(':tracing-extensions:ballerina-jaeger-otel-extension')
    dist project(':tracing-extensions:ballerina-zipkin-otel-extension')
    dist "io.jaegertracing:jaeger-core:${jaegerVersion}"
    dist "io.jaegertracing:jaeger-thrift:${jaegerVersion}"
    dist "org.apache.thrift:libthrift:${libthriftVersion}"
    dist "com.squareup.okhttp3:okhttp:${okhttpVersion}"
    dist "com.squareup.okio:okio:${okioVersion}"
    dist "com.squareup.okio:okio-jvm:${okioVersion}"
    dist "io.opentelemetry:opentelemetry-api:${openTelemetryVersion}"
    dist "io.opentelemetry:opentelemetry-context:${openTelemetryVersion}"
    dist "io.opentelemetry:opentelemetry-sdk-trace:${openTelemetryVersion}"
    dist "io.opentelemetry:opentelemetry-sdk-common:${openTelemetryVersion}"
    dist "io.opentelemetry.semconv:opentelemetry-semconv:${openTelemetrySemconvVersion}"
    dist "io.opentelemetry:opentelemetry-proto:${openTelemetryProtoVersion}"
    dist "io.opentelemetry:opentelemetry-exporter-otlp:${openTelemetryVersion}"
    dist "io.opentelemetry:opentelemetry-exporter-otlp-common:${openTelemetryVersion}"
    dist "io.opentelemetry:opentelemetry-extension-trace-propagators:${openTelemetryVersion}"
    dist "io.opentelemetry:opentelemetry-exporter-sender-okhttp:${openTelemetryVersion}"
    dist "io.grpc:grpc-api:${grpcVersion}"
    dist "io.grpc:grpc-context:${grpcVersion}"
    dist "io.grpc:grpc-core:${grpcVersion}"
    dist "io.grpc:grpc-stub:${grpcVersion}"
    dist "io.grpc:grpc-protobuf:${grpcVersion}"
    dist "io.grpc:grpc-protobuf-lite:${grpcVersion}"
    dist "io.grpc:grpc-netty-shaded:${grpcVersion}"
    dist "com.google.protobuf:protobuf-java:${protobufVersion}"
    dist "io.netty:netty-handler:${nettyVersion}"
    dist "io.perfmark:perfmark-api:${perfmarkVersion}"
    dist "com.google.guava:guava:${guavaVersion}"
    dist "com.google.guava:failureaccess:${failureAccessVersion}"
    dist "io.zipkin.zipkin2:zipkin:${zipkinVersion}"
    dist "io.zipkin.reporter2:zipkin-reporter:${zipkinReporterVersion}"
    dist "io.zipkin.reporter2:zipkin-sender-okhttp3:${zipkinReporterVersion}"
    dist "org.jetbrains.kotlin:kotlin-runtime:${kotlinRuntimeVersion}"
    dist "org.jetbrains.kotlin:kotlin-stdlib:${kotlinStdlibVersion}"
    dist "io.opentelemetry:opentelemetry-exporter-zipkin:${openTelemetryVersion}"
    dist "io.opentelemetry:opentelemetry-exporter-common:${openTelemetryVersion}"

    // Temporary adding . Need to Remove once fix #17878
    dist "com.google.code.gson:gson:${gsonVersion}"

    // Other Runtime Libs
    dist project(':ballerina-runtime')
    dist project(':ballerina-core')
    dist project(':ballerina-config')
    dist project(':ballerina-logging')
    dist project(':toml-parser')

}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    dependsOn configurations.dist
    from { configurations.dist.collect { it.isDirectory() ? it : zipTree(it) } }
}

description = 'Ballerina - Runtime'
