        implementation "io.swagger.parser.v3:swagger-parser-v2-converter:${swaggerParserVersion}"
        implementation "io.swagger.parser.v3:swagger-parser:${swaggerParserVersion}"
        implementation "me.tongfei:progressbar:${progressbarVersion}"
        implementation "org.jline:jline:${jlineVersion}"

        implementation "javax.transaction:javax.transaction-api:${javaxTransactionVersion}"
        implementation "javax.ws.rs:javax.ws.rs-api:${javaxWsRsVersion}"
        implementation "junit:junit:${junitVersion}"
    }
}

sourceCompatibility = '1.8'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

checkstyle {
    toolVersion "${checkstyleToolVersion}"
    configFile rootProject.file("build-config/checkstyle/build/checkstyle.xml")
}

spotbugsMain {
    it.effort "max"
    it.reportLevel "low"
    it.reports {
        xml.enabled false
        html.enabled true
    }
    def excludeFile = file('spotbugs-exclude.xml')
    if(excludeFile.exists()) {
        it.excludeFilter = excludeFile
    }
}

spotbugsTest {
    it.enabled = false
}

test {
    testLogging {
        // Make sure output from standard out or error is shown in Gradle output.
        showStackTraces = true
        showStandardStreams = true
    }
    systemProperty "ballerina.home", "$buildDir"
    systemProperty "org.apache.commons.logging.Log", "org.apache.commons.logging.impl.NoOpLog"
    testLogging {
        events "failed"
        exceptionFormat "full"
    }
}

jacocoTestReport {
    reports {
        xml.enabled true
    }
}

task createJavadoc(type: Javadoc) {
    source = sourceSets.main.java
    classpath = sourceSets.main.compileClasspath
    failOnError true
    options.addStringOption('Xwerror', '-quiet')
}

check {
    dependsOn createJavadoc
}

publishing {
    publications {
        mavenJava {
            from components.java
        }
    }
}
