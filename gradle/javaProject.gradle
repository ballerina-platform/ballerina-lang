        implementation "io.netty:netty-tcnative-boringssl-static:${boringSslVersion}"
        implementation "io.netty:netty-tcnative-boringssl-static:${boringSslVersion}:windows-x86_64"
        implementation "io.netty:netty-tcnative-boringssl-static:${boringSslVersion}:linux-aarch_64"
