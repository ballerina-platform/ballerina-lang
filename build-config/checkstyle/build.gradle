plugins {
    id "de.undercouch.download" version "5.4.0"
    id 'base'
}

tasks.register('downloadFile', Download) {
    src([
            'https://raw.githubusercontent.com/wso2/code-quality-tools/v1.4/checkstyle/jdk-17/checkstyle.xml',
            'https://raw.githubusercontent.com/wso2/code-quality-tools/v1.4/checkstyle/jdk-17/suppressions.xml'
    ])
    dest layout.buildDirectory.get().asFile
    overwrite false
    outputs.files(layout.buildDirectory.file("checkstyle.xml"))
}

artifacts.add('default', layout.buildDirectory.file("checkstyle.xml").get().asFile) {
    builtBy('downloadFile') 
}

